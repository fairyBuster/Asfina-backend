# ========================================================
# CADDY CONFIGURATION - SIMPLE FILE LOGGING
# Both backend & frontend with file logging
# ========================================================
{
        auto_https off

        # Global logging
        log {
                output file /var/log/caddy/access.log {
                        roll_size 100mb
                        roll_keep 5
                        roll_keep_for 720h
                }
                format json
                level info
        }
}

# ========================================================
# BACKEND API - appgoldare.online
# ========================================================

appgoldare.online www.appgoldare.online {
        # TLS dengan Cloudflare certificate
        tls /etc/ssl/cloudflare/cert.pem /etc/ssl/cloudflare/key.pem

        # Domain-specific logging
        log {
                output file /var/log/caddy/appgoldare.online.log {
                        roll_size 100mb
                        roll_keep 5
                }
                format json
                level info
        }

        # Security Headers
        header X-Content-Type-Options "nosniff"
        header X-Frame-Options "DENY"
        header X-XSS-Protection "1; mode=block"
        header Referrer-Policy "strict-origin-when-cross-origin"
        header -Server

        # Health Check
        handle /health {
                reverse_proxy 127.0.0.1:8000 {
                        header_up Host {host}
                        header_up X-Forwarded-Proto https
                        header_up X-Real-IP {remote_ip}
                        header_up X-Forwarded-For {remote_ip}
                }
        }

        # Static Files
        handle_path /static/* {
                root * /root/corevolt-backend/staticfiles
                header Cache-Control "public, max-age=31536000, immutable"
                header X-Content-Type-Options "nosniff"
                encode gzip zstd
                file_server {
                        browse off
                }
        }

        # Media Files
        handle_path /media/* {
                root * /root/corevolt-backend/media
                header Cache-Control "public, max-age=2592000"
                header X-Content-Type-Options "nosniff"
                encode gzip zstd
                file_server {
                        browse off
                }
        }

        # API Endpoints
        handle {
                # CORS Preflight
                @options method OPTIONS
                handle @options {
                        header Access-Control-Allow-Origin {http.request.header.Origin}
                        header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS"
                        header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With, Cache-Control, Pragma, Expires, Accept, Origin"
                        header Access-Control-Allow-Credentials "true"
                        header Access-Control-Max-Age "86400"
                        header Content-Length "0"
                        respond "" 204
                }

                # Reverse proxy ke Django
                reverse_proxy 127.0.0.1:8000 {
                        header_up Host {host}
                        header_up X-Forwarded-Proto https
                        header_up X-Real-IP {remote_ip}
                        header_up X-Forwarded-For {remote_ip}
                        header_up X-Request-ID {http.request.id}
                }

                # CORS headers
                header Access-Control-Allow-Origin {http.request.header.Origin}

                # Compression
                encode gzip zstd
        }
}

# ========================================================
# FRONTEND SPA - ccvoltasein.com
# ========================================================

ccvoltasein.com www.ccvoltasein.com {
        # TLS dengan Cloudflare certificate
        tls /etc/ssl/cloudflare/cert.pem /etc/ssl/cloudflare/key.pem

        # Domain-specific logging
        log {
                output file /var/log/caddy/ccvoltasein.com.log {
                        roll_size 100mb
                        roll_keep 5
                }
                format json
                level info
        }

        # Security Headers
        header X-Content-Type-Options "nosniff"
        header X-Frame-Options "DENY"
        header X-XSS-Protection "1; mode=block"
        header Referrer-Policy "strict-origin-when-cross-origin"
        header -Server

        # Block Bad User Agents
        @bad_ua {
                header User-Agent {curl|wget|python-requests|httpclient|scrapy|bot|spider|scan|masscan|dirbuster|nmap}
        }
        handle @bad_ua {
                respond "Forbidden" 403
        }

        # Root & SPA Configuration
        root * /var/www/frontend-spa/dist

        # Favicon
        handle /favicon.ico {
                header Cache-Control "public, max-age=31536000, immutable"
                file_server
        }

        # Index.html - No Cache
        handle /index.html {
                header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0"
                header Expires "-1"
                header Pragma "no-cache"
                file_server
        }

        # Static Assets - Aggressive Caching
        @static_files {
                path_regexp ^.*\.(js|css|png|jpg|jpeg|gif|svg|webp|ico|woff|woff2|ttf|eot)$
        }
        handle @static_files {
                header Cache-Control "public, max-age=604800, immutable"
                header X-Content-Type-Options "nosniff"
                encode gzip zstd
                file_server
        }

        # /api/* Proxy
        @api path /api/*
        handle @api {
                reverse_proxy https://appgoldare.online {
                        header_up Host appgoldare.online
                        header_up X-Forwarded-Proto https
                        header_up X-Real-IP {remote_ip}
                        header_up X-Forwarded-For {remote_ip}
                }
                encode gzip zstd
        }

        # /logout Proxy
        @logout path /logout
        handle @logout {
                reverse_proxy https://appgoldare.online {
                        header_up Host appgoldare.online
                        header_up X-Forwarded-Proto https
                        header_up X-Real-IP {remote_ip}
                        header_up X-Forwarded-For {remote_ip}
                }
        }

        # /gateway/* → /api/* Rewrite
        @gateway path /gateway/*
        handle @gateway {
                uri replace /gateway/ /api/
                reverse_proxy https://appgoldare.online {
                        header_up Host appgoldare.online
                        header_up X-Forwarded-Proto https
                        header_up X-Real-IP {remote_ip}
                        header_up X-Forwarded-For {remote_ip}
                }
        }

        # /media/* dengan CORS
        @media path /media/*
        handle @media {
                @options method OPTIONS
                handle @options {
                        header Access-Control-Allow-Origin {http.request.header.Origin}
                        header Access-Control-Allow-Methods "GET, OPTIONS"
                        header Access-Control-Allow-Headers "Authorization, Content-Type"
                        header Access-Control-Max-Age "86400"
                        header Content-Length "0"
                        respond "" 204
                }

                header Access-Control-Allow-Origin {http.request.header.Origin}

                reverse_proxy https://appgoldare.online {
                        header_up Host appgoldare.online
                        header_up X-Forwarded-Proto https
                        header_up X-Real-IP {remote_ip}
                        header_up X-Forwarded-For {remote_ip}
                }
        }

        # SPA Fallback
        @not_static {
                not path /static/* /index.html /favicon.ico /api/* /logout /gateway/* /media/*
                not file
        }
        handle @not_static {
                rewrite * /index.html
                file_server
        }

        # Serve Static Files
        encode gzip zstd
        file_server {
                browse off
        }

        # Error Handling
        handle_errors {
                header Content-Type "text/html; charset=utf-8"
                @404 expression `{http.error.status_code} == 404`
                handle @404 {
                        rewrite * /index.html
                        file_server
                }

                handle {
                        header Content-Type "text/plain"
                        respond "Error {http.error.status_code}" {http.error.status_code}
                }
        }
}